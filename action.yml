name: Build Docker Hardened Image
description: 'Builds a secure Image using SBOM and supply chain attestations.'

inputs:
  docker_image:
    description: 'Docker image name (e.g. user/repo)'
    required: true
  docker_build_dir:
    description: 'Build context directory (defaults to .)'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set short SHA
      shell: bash
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Build
      shell: bash
      run: |
        DOCKERFILE="${{ inputs.docker_build_dir }}/Dockerfile"
        if [ ! -f "$DOCKERFILE" ]; then
          DOCKERFILE="Dockerfile"
        fi

        docker buildx build \
          -t ${{ inputs.docker_image }}:latest \
          -t ${{ inputs.docker_image }}:${{ env.SHORT_SHA }} \
          -f "$DOCKERFILE" \
          --attest type=provenance,mode=max,version=v1 \
          --sbom=true \
          ${{ inputs.docker_build_dir }}
